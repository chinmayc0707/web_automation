<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Models</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 860px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.4;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 700;
      }
      input {
        width: 100%;
        margin-top: 6px;
        padding: 8px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        padding: 10px 14px;
        cursor: pointer;
      }
      #status {
        margin: 12px 0;
        color: #444;
      }
      #models {
        margin-top: 12px;
        padding-left: 20px;
      }
      #hostResults {
        margin-top: 12px;
        padding-left: 20px;
      }
      code {
        background: #f4f4f4;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Available Ollama Models</h1>
    <p>Fetches models from all configured Ollama hosts via <code>/api/tags</code>.</p>

    <label for="hostsInput">Ollama hosts (comma-separated)</label>
    <input
      id="hostsInput"
      type="text"
      value="http://localhost:11434, http://127.0.0.1:11434, http://host.docker.internal:11434"
    />

    <button id="fetchModelsBtn" type="button">Fetch models from all hosts</button>
    <div id="status">Click the button to load models.</div>

    <h2>Models</h2>
    <ul id="models"></ul>

    <h2>Per-host results</h2>
    <ul id="hostResults"></ul>

    <script>
      const fetchButton = document.getElementById('fetchModelsBtn');
      const hostsInput = document.getElementById('hostsInput');
      const statusEl = document.getElementById('status');
      const modelsEl = document.getElementById('models');
      const hostResultsEl = document.getElementById('hostResults');

      function parseHosts(rawValue) {
        return rawValue
          .split(',')
          .map((host) => host.trim())
          .filter(Boolean)
          .filter((host, index, all) => all.indexOf(host) === index);
      }

      async function fetchModelsFromHost(host) {
        const response = await fetch(`${host}/api/tags`);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const models = Array.isArray(data.models) ? data.models : [];
        return { host, models };
      }

      async function fetchAllOllamaModels() {
        const hosts = parseHosts(hostsInput.value);
        modelsEl.innerHTML = '';
        hostResultsEl.innerHTML = '';

        if (hosts.length === 0) {
          statusEl.textContent = 'Please provide at least one Ollama host.';
          return;
        }

        statusEl.textContent = `Fetching models from ${hosts.length} host(s)...`;

        const results = await Promise.allSettled(hosts.map((host) => fetchModelsFromHost(host)));

        const mergedModels = new Map();
        let successCount = 0;

        results.forEach((result, index) => {
          const host = hosts[index];
          const hostLine = document.createElement('li');

          if (result.status === 'fulfilled') {
            successCount += 1;
            const hostModels = result.value.models;

            hostLine.textContent = `${host}: ${hostModels.length} model(s) loaded`;

            hostModels.forEach((model) => {
              const modelName = model.name || '(unnamed model)';
              if (!mergedModels.has(modelName)) {
                mergedModels.set(modelName, new Set());
              }
              mergedModels.get(modelName).add(host);
            });
          } else {
            hostLine.textContent = `${host}: failed (${result.reason?.message || result.reason})`;
          }

          hostResultsEl.appendChild(hostLine);
        });

        if (mergedModels.size === 0) {
          statusEl.textContent =
            successCount === 0
              ? 'Could not fetch models from any host.'
              : 'Connected, but no models were found on the reachable hosts.';
          return;
        }

        [...mergedModels.entries()]
          .sort((a, b) => a[0].localeCompare(b[0]))
          .forEach(([modelName, hostSet]) => {
            const li = document.createElement('li');
            li.textContent = `${modelName} (${[...hostSet].join(', ')})`;
            modelsEl.appendChild(li);
          });

        statusEl.textContent = `Loaded ${mergedModels.size} unique model(s) from ${successCount}/${hosts.length} host(s).`;
      }

      fetchButton.addEventListener('click', fetchAllOllamaModels);
    </script>
  </body>
</html>
